<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product List</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px;">

    <h2 style="text-align: center; color: #333;">Product List</h2>

    <ul style="list-style-type: none; padding: 0; max-width: 600px; margin: 0 auto;">
        {% for product in products %}
        <li style="background: white; margin-bottom: 15px; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
            
            <!-- Product Image -->
            {% if product.images.first %}
                <img src="{{ product.images.first.image.url }}" 
                     style="width: 120px; border-radius: 6px; margin-bottom: 10px;">
            {% endif %}

            <!-- Product Name -->
            <a href="{% url 'product_detail' product.pk %}" 
               style="text-decoration: none; font-size: 18px; font-weight: bold; color: #2c3e50;">
               {{ product.name }}
            </a>

            <!-- Price -->
            <p style="margin: 8px 0; color: #555; font-size: 16px;">
                ${{ product.price }}
            </p>

            <!-- Stock -->
            {% if product.in_stock %}
                <span style="color: green; font-weight: bold;">(In stock)</span>
            {% else %}
                <span style="color: red; font-weight: bold;">(Not in stock)</span>
            {% endif %}
            
        </li>
        {% endfor %}
    </ul>

</body>
</html>
